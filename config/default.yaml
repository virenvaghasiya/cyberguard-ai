# CyberGuard AI — Default Configuration
# Copy to config/local.yaml and modify for your environment.

app:
  name: "CyberGuard AI"
  version: "0.1.0"
  log_level: "INFO"   # DEBUG, INFO, WARNING, ERROR
  log_format: "json"  # json or console

# Network Traffic Anomaly Detector
network_detector:
  enabled: true
  interface: null        # Network interface to monitor (null = read from file)
  input_file: null       # CSV/PCAP file to analyze
  batch_size: 1000       # Number of flow records per analysis batch
  analysis_interval: 30  # Seconds between analysis cycles

  # Feature extraction
  features:
    - flow_duration
    - packet_count
    - byte_count
    - packets_per_second
    - bytes_per_second
    - src_port_entropy
    - dst_port_entropy
    - protocol_distribution
    - inter_arrival_time_mean
    - inter_arrival_time_std

  # Anomaly detection model
  model:
    type: "isolation_forest"  # isolation_forest, autoencoder, xgboost
    contamination: 0.05       # Expected proportion of anomalies (5%)
    n_estimators: 200
    model_path: "data/models/network_anomaly_model.joblib"

  # Alert thresholds
  alerting:
    score_threshold: -0.3        # Anomaly score threshold (lower = more anomalous)
    min_confidence: 0.7          # Minimum confidence to fire alert
    cooldown_seconds: 60         # Avoid duplicate alerts within window
    severity_mapping:
      high: -0.7
      medium: -0.5
      low: -0.3

# Alert Manager
alerts:
  storage: "sqlite"
  database_url: "sqlite:///data/alerts.db"
  retention_days: 90

# API Server
api:
  host: "0.0.0.0"
  port: 8000
  cors_origins:
    - "http://localhost:3000"
  auth_enabled: false  # Enable for production

log_analyzer:
  enabled: true
  # Number of failed logins from one IP to trigger brute force alert
  brute_force_threshold: 5
  # Number of 4xx errors from one IP to trigger web scanning alert
  web_scan_threshold: 20
  # Sudo commands that always warrant a HIGH severity alert
  sensitive_commands:
    - passwd
    - useradd
    - userdel
    - usermod
    - visudo
    - chmod
    - chown
    - rm -rf
    - dd
    - mkfs
    - fdisk
    - iptables
    - ufw
    - systemctl
    - service

vulnerability_scanner:
  enabled: true
  # Seconds to wait per port before declaring it closed
  timeout: 1.0
  # Max ports scanned in parallel per host
  max_concurrent: 50
  # Ports to check (defaults to all known risky ports if omitted)
  # ports: [22, 23, 21, 3306, 5432, 6379, 27017, 9200, 2375, 3389, 5900]

phishing_detector:
  enabled: false
